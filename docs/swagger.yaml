basePath: /
definitions:
  controller.batchResponse:
    properties:
      results:
        items:
          $ref: '#/definitions/controller.ingestResponse'
        type: array
    type: object
  controller.ingestResponse:
    properties:
      event_id:
        type: string
      message:
        type: string
      received_at:
        type: string
      status:
        type: string
      storage_uri:
        type: string
      stored_at:
        type: string
    type: object
  controller.recordResponse:
    properties:
      event_id:
        type: string
      event_name:
        type: string
      event_sha256:
        type: string
      event_version:
        type: string
      last_error:
        type: string
      partition_id:
        type: string
      payload_sha256:
        type: string
      producer_service:
        type: string
      raw_envelope:
        type: object
      received_at:
        type: string
      status:
        type: string
      storage_uri:
        type: string
      stored_at:
        type: string
      subject_id:
        type: string
      subject_type:
        type: string
    type: object
  events.Actor:
    properties:
      id:
        type: string
      type:
        type: string
    type: object
  events.BatchRequest:
    properties:
      events:
        items:
          $ref: '#/definitions/events.Envelope'
        type: array
    type: object
  events.Envelope:
    properties:
      actor:
        $ref: '#/definitions/events.Actor'
      aggregate_id:
