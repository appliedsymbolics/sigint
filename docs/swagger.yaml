        type: string
      event_name:
        type: string
      event_sha256:
        type: string
      event_version:
        type: string
      observed_at:
        type: string
      occurred_at:
        type: string
      partition_id:
        type: string
      payload:
        additionalProperties: {}
        type: object
      payload_sha256:
        type: string
      producer_deployment:
        type: string
      producer_instance:
        type: string
      producer_service:
        type: string
      subject_id:
        type: string
      subject_type:
        type: string
    type: object
  events.ReplayEvent:
    properties:
      actor_id:
        type: string
      actor_type:
        type: string
      aggregate_id:
        type: string
      aggregate_type:
        type: string
      causation_id:
        type: string
      correlation_id:
        type: string
      cursor:
        type: integer
      event_id:
        type: string
      event_name:
        type: string
      event_sha256:
        type: string
      event_version:
        type: string
      observed_at:
        type: string
      occurred_at:
        type: string
      partition_id:
        type: string
      payload_sha256:
        type: string
